<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 640" width="400" height="640">
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; fill: #1a1a1a; }
    .box { fill: none; stroke: #1a1a1a; stroke-width: 1.5; rx: 6; ry: 6; }
    .box-boundary { fill: none; stroke: #1a1a1a; stroke-width: 2.5; rx: 6; ry: 6; stroke-dasharray: 8,4; }
    .arrow { stroke: #1a1a1a; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .label { font-size: 14px; text-anchor: middle; font-weight: 600; }
    .sublabel { font-size: 11px; text-anchor: middle; fill: #555; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1a1a"/>
    </marker>
  </defs>
  <!-- Box 1: Operational Assumptions -->
  <rect class="box" x="100" y="30" width="200" height="60"/>
  <text class="label" x="200" y="57">Operational Assumptions</text>
  <text class="sublabel" x="200" y="73">Implicit conditions of validity</text>
  <!-- Arrow 1-2 -->
  <line class="arrow" x1="200" y1="90" x2="200" y2="130"/>
  <!-- Box 2: Operational Mode -->
  <rect class="box" x="100" y="130" width="200" height="60"/>
  <text class="label" x="200" y="157">Operational Mode</text>
  <text class="sublabel" x="200" y="173">System functions as designed</text>
  <!-- Arrow 2-3 -->
  <line class="arrow" x1="200" y1="190" x2="200" y2="230"/>
  <!-- Box 3: Correct Execution -->
  <rect class="box" x="100" y="230" width="200" height="60"/>
  <text class="label" x="200" y="257">Correct Execution</text>
  <text class="sublabel" x="200" y="273">Procedures remain internally valid</text>
  <!-- Arrow 3-4 -->
  <line class="arrow" x1="200" y1="290" x2="200" y2="330"/>
  <!-- Box 4: Constraint Pressure -->
  <rect class="box" x="100" y="330" width="200" height="60"/>
  <text class="label" x="200" y="357">Constraint Pressure</text>
  <text class="sublabel" x="200" y="373">Gradual compression of validity</text>
  <!-- Arrow 4-5 -->
  <line class="arrow" x1="200" y1="390" x2="200" y2="440"/>
  <!-- Box 5: Applicability Boundary (dashed, emphasized) -->
  <rect class="box-boundary" x="75" y="440" width="250" height="70"/>
  <text class="label" x="200" y="470" style="font-size:15px;">Applicability Boundary</text>
  <text class="sublabel" x="200" y="490">Structural limit of valid governance</text>
  <!-- Arrow 5-6 -->
  <line class="arrow" x1="200" y1="510" x2="200" y2="550"/>
  <!-- Box 6: Loss of Model Validity -->
  <rect class="box" x="100" y="550" width="200" height="60"/>
  <text class="label" x="200" y="577">Loss of Model Validity</text>
  <text class="sublabel" x="200" y="593">Logic correct, reality misaligned</text>
  <!-- Footer -->
  <text x="200" y="635" style="font-size:10px; text-anchor:middle; fill:#888;">Applicability Boundary Doctrine — Canonical Concept Diagram — v1.16</text>
</svg>
